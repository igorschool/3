<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Задание 3: Покорми друзей</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: #fef3c7;
            color: #1e293b;
            overflow: hidden;
            /* Убираем выделение и системные фоны при нажатии */
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            touch-action: none;
        }

        /* Убираем синие/белые рамки у всех активных элементов */
        *:focus, *:active {
            outline: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        .cookie {
            width: 60px;
            height: 60px;
            background-color: #d97706;
            border: 4px solid #fde68a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fef3c7;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            position: absolute;
            z-index: 1000;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .bowl-hit-zone {
            width: 240px;
            height: 140px;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            cursor: pointer;
            border-radius: 20px;
        }

        /* Стилизация миски через SVG для чистоты (без фона) */
        .bowl-svg {
            width: 200px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
            pointer-events: none;
        }

        .animal-icon {
            font-size: 100px;
            margin-bottom: -10px;
            transition: transform 0.3s;
        }
        
        #cookie-box {
            width: 160px;
            cursor: pointer;
            transition: transform 0.2s;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }
        #cookie-box:active { transform: scale(0.95); }

        .click-hint {
            animation: bounce 2s infinite;
            font-weight: 900;
            color: #92400e;
            font-size: 14px;
            text-transform: uppercase;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .bowl-active .bowl-svg {
            transform: scale(1.05);
            filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.5));
        }

        .counter {
            position: absolute;
            right: 10px;
            top: 50%;
            background: #ef4444;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            border: 3px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 50;
        }
    </style>
</head>
<body class="h-screen flex flex-col p-6">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-3xl font-black text-amber-900 uppercase">Задание №3</h1>
            <p class="text-xl font-bold text-amber-800/80">Нажимай на печеньки или миски!</p>
        </div>
        <div class="bg-white/50 p-2 rounded-full border-2 border-amber-200">
             <i class="fa-solid fa-face-smile text-4xl text-amber-600"></i>
        </div>
    </div>

    <!-- Game Area -->
    <div class="flex-1 flex flex-col items-center justify-between">
        
        <div class="flex justify-around w-full max-w-5xl items-center">
            <!-- Cat -->
            <div class="flex flex-col items-center relative" onclick="magnetizeTo('cat')">
                <div id="icon-cat" class="animal-icon text-purple-500"><i class="fa-solid fa-cat"></i></div>
                <div id="zone-cat" class="bowl-hit-zone" data-target="cat">
                    <div id="count-cat" class="counter">0</div>
                    <svg class="bowl-svg" viewBox="0 0 200 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10 20C10 20 20 80 100 80C180 80 190 20 190 20H10Z" fill="#67E8F9"/>
                        <ellipse cx="100" cy="20" rx="90" ry="15" fill="#22D3EE"/>
                    </svg>
                </div>
                <span class="mt-4 font-black text-purple-900 text-2xl uppercase tracking-tighter">Снежок</span>
            </div>

            <!-- Dog -->
            <div class="flex flex-col items-center relative" onclick="magnetizeTo('dog')">
                <div id="icon-dog" class="animal-icon text-orange-500"><i class="fa-solid fa-dog"></i></div>
                <div id="zone-dog" class="bowl-hit-zone" data-target="dog">
                    <div id="count-dog" class="counter">0</div>
                    <svg class="bowl-svg" viewBox="0 0 200 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10 20C10 20 20 80 100 80C180 80 190 20 190 20H10Z" fill="#FDE047"/>
                        <ellipse cx="100" cy="20" rx="90" ry="15" fill="#FACC15"/>
                    </svg>
                </div>
                <span class="mt-4 font-black text-orange-900 text-2xl uppercase tracking-tighter">Барон</span>
            </div>
        </div>

        <!-- Box Area -->
        <div class="flex flex-col items-center gap-4 mb-10">
            <div id="cookie-box" onclick="spawnCookie()">
                <div class="click-hint text-center mb-2">Нажми сюда!</div>
                <div class="w-40 h-32 bg-amber-700 rounded-b-xl relative flex items-center justify-center border-t-4 border-amber-900">
                    <div class="absolute -top-4 w-44 h-8 bg-amber-800 rounded-lg"></div>
                    <i class="fa-solid fa-cookie-bite text-5xl text-amber-200 opacity-50"></i>
                </div>
            </div>

            <button id="btn-done" onclick="checkFinal()" 
                class="bg-slate-300 text-white font-black py-4 px-12 rounded-2xl text-2xl shadow-lg opacity-40 pointer-events-none transition-all uppercase">
                Готово!
            </button>
        </div>
    </div>

    <!-- Win UI -->
    <div id="win-ui" class="fixed inset-0 bg-amber-900/90 hidden flex-col items-center justify-center z-[5000] p-6 text-center">
        <div class="bg-white p-8 rounded-3xl border-8 border-green-400 max-w-sm">
            <div class="text-8xl mb-4">🍪</div>
            <h2 class="text-4xl font-black text-slate-800 mb-4 uppercase">Ура!</h2>
            <p class="text-xl font-bold text-slate-600 mb-8">Ты разделил всё поровну. Друзья довольны!</p>
            <button onclick="location.reload()" class="bg-green-500 text-white font-black py-4 px-8 rounded-xl text-xl w-full uppercase">Играть ещё</button>
        </div>
    </div>

    <script>
        let counts = { cat: 0, dog: 0 };
        let total = 0;
        const limit = 10;
        const cookies = [];

        function spawnCookie() {
            if (total >= limit) return;
            total++;

            const box = document.getElementById('cookie-box');
            const b = box.getBoundingClientRect();
            
            const c = document.createElement('div');
            c.className = 'cookie';
            c.innerHTML = '<i class="fa-solid fa-cookie"></i>';
            c.style.left = (b.left + b.width/2 - 30) + 'px';
            c.style.top = (b.top - 20) + 'px';
            
            document.body.appendChild(c);
            cookies.push(c);
            
            // Вылет
            setTimeout(() => {
                const angle = (Math.random() * Math.PI) + Math.PI; 
                const d = 120 + Math.random() * 50;
                c.style.transition = 'all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.2)';
                c.style.transform = `translate(${Math.cos(angle)*d}px, ${Math.sin(angle)*d}px)`;
            }, 10);

            c.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!c.dataset.side) {
                    const target = counts.cat <= counts.dog ? 'cat' : 'dog';
                    moveTo(c, target);
                }
            });
        }

        function magnetizeTo(target) {
            const free = cookies.find(c => !c.dataset.side);
            if (free) moveTo(free, target);
        }

        function moveTo(el, target) {
            const zone = document.getElementById(`zone-${target}`);
            const r = zone.getBoundingClientRect();
            
            if (!el.dataset.side) {
                counts[target]++;
            } else if (el.dataset.side !== target) {
                counts[el.dataset.side]--;
                counts[target]++;
            }

            el.dataset.side = target;
            document.getElementById(`count-${target}`).innerText = counts[target];
            document.getElementById(`count-cat`).innerText = counts.cat;
            document.getElementById(`count-dog`).innerText = counts.dog;

            // Рандом внутри миски
            const rx = (Math.random() - 0.5) * 100;
            const ry = (Math.random() - 0.5) * 30;
            
            el.style.transition = 'all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
            el.style.left = (r.left + r.width / 2 - 30 + rx) + 'px';
            el.style.top = (r.top + r.height / 2 - 10 + ry) + 'px';
            el.style.transform = 'scale(0.85) rotate(' + (Math.random()*40-20) + 'deg)';

            updateUI();
        }

        function updateUI() {
            const btn = document.getElementById('btn-done');
            const ready = (counts.cat + counts.dog) === limit;
            
            if (ready) {
                btn.classList.remove('bg-slate-300', 'opacity-40', 'pointer-events-none');
                btn.classList.add('bg-blue-600', 'opacity-100');
            }
        }

        function checkFinal() {
            if (counts.cat === 5 && counts.dog === 5) {
                document.getElementById('win-ui').classList.remove('hidden');
                document.getElementById('win-ui').classList.add('flex');
            } else {
                const btn = document.getElementById('btn-done');
                btn.classList.add('bg-red-500');
                btn.innerText = "НУЖНО ПОРОВНУ!";
                setTimeout(() => {
                    btn.classList.remove('bg-red-500');
                    btn.innerText = "ГОТОВО!";
                }, 1200);
            }
        }
    </script>
</body>
</html>
