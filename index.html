<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Задание 3: Покорми друзей</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: #fef3c7;
            color: #1e293b;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: none;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        .cookie {
            background-color: #d97706;
            border: 3px solid #fde68a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fef3c7;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            position: absolute;
            z-index: 1000;
            pointer-events: auto;
        }

        .bowl-hit-zone {
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            cursor: pointer;
            width: clamp(140px, 25vw, 220px);
            height: clamp(70px, 12vw, 110px);
        }

        .bowl-svg { width: 100%; height: 100%; pointer-events: none; }

        .animal-icon { font-size: clamp(50px, 10vw, 100px); transition: transform 0.3s; }

        .counter {
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%);
            background: #ef4444;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            border: 2px solid white;
            z-index: 50;
        }

        /* Адаптация под вертикальный экран */
        .animals-container {
            display: flex;
            flex-wrap: wrap; /* Позволяет переносить миски на новую строку */
            justify-content: space-around;
            align-items: center;
            gap: 20px;
            width: 100%;
            flex: 1;
        }

        .bottom-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
        }

        #cookie-box { cursor: pointer; text-align: center; }
        .box-body {
            width: 120px;
            height: 80px;
            background: #b45309;
            border-radius: 0 0 10px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        #btn-done {
            font-weight: 900;
            border-radius: 12px;
            padding: 12px 40px;
        }
    </style>
</head>
<body>

    <div class="flex justify-between items-center mb-4">
        <h1 class="text-xl font-black text-amber-900 uppercase">Задание №3</h1>
        <div class="bg-white/50 p-2 rounded-full border-2 border-amber-200">
            <i class="fa-solid fa-cookie-bite text-amber-600 text-2xl"></i>
        </div>
    </div>

    <div class="animals-container">
        <div class="flex flex-col items-center relative" onclick="magnetizeTo('cat')">
            <div id="icon-cat" class="animal-icon text-purple-500"><i class="fa-solid fa-cat"></i></div>
            <div id="zone-cat" class="bowl-hit-zone">
                <div id="count-cat" class="counter">0</div>
                <svg class="bowl-svg" viewBox="0 0 200 100">
                    <path d="M10 20C10 20 20 80 100 80C180 80 190 20 190 20H10Z" fill="#67E8F9"/>
                    <ellipse cx="100" cy="20" rx="90" ry="15" fill="#22D3EE"/>
                </svg>
            </div>
            <span class="font-black text-purple-900 mt-2 uppercase text-sm">Снежок</span>
        </div>

        <div class="flex flex-col items-center relative" onclick="magnetizeTo('dog')">
            <div id="icon-dog" class="animal-icon text-orange-500"><i class="fa-solid fa-dog"></i></div>
            <div id="zone-dog" class="bowl-hit-zone">
                <div id="count-dog" class="counter">0</div>
                <svg class="bowl-svg" viewBox="0 0 200 100">
                    <path d="M10 20C10 20 20 80 100 80C180 80 190 20 190 20H10Z" fill="#FDE047"/>
                    <ellipse cx="100" cy="20" rx="90" ry="15" fill="#FACC15"/>
                </svg>
            </div>
            <span class="font-black text-orange-900 mt-2 uppercase text-sm">Барон</span>
        </div>
    </div>

    <div class="bottom-area">
        <div id="cookie-box" onclick="spawnCookie()">
            <div class="box-body">
                <i class="fa-solid fa-cookie-bite text-amber-200 text-4xl opacity-50"></i>
            </div>
        </div>
        <button id="btn-done" onclick="checkFinal()" 
            class="bg-gray-400 text-white opacity-40 pointer-events-none transition-all">
            Готово!
        </button>
    </div>

    <div id="win-ui" style="display:none;" class="fixed inset-0 bg-amber-900/90 flex items-center justify-center z-[5000] p-6 text-center">
        <div class="bg-white p-8 rounded-3xl border-8 border-green-400 max-w-sm w-full">
            <div class="text-6xl mb-4">🍪</div>
            <h2 class="text-2xl font-black mb-2">УРА!</h2>
            <p class="font-bold text-gray-600 mb-6">Ты разделил всё поровну!</p>
            <button onclick="location.reload()" class="bg-green-500 text-white font-black py-3 px-8 rounded-xl w-full">ЗАНОВО</button>
        </div>
    </div>

    <script>
        let counts = { cat: 0, dog: 0 };
        let total = 0;
        const limit = 10;
        const cookies = [];

        function getCookieSize() {
            return Math.round(Math.min(Math.max(40, window.innerWidth * 0.08), 65));
        }

        function spawnCookie() {
            if (total >= limit) return;
            total++;

            const box = document.getElementById('cookie-box');
            const b = box.getBoundingClientRect();
            const sz = getCookieSize();

            const c = document.createElement('div');
            c.className = 'cookie';
            c.style.width = sz + 'px';
            c.style.height = sz + 'px';
            c.style.fontSize = (sz * 0.5) + 'px';
            c.innerHTML = '<i class="fa-solid fa-cookie"></i>';
            
            // Начальная позиция у коробки
            c.style.left = (b.left + b.width/2 - sz/2) + 'px';
            c.style.top = (b.top - 20) + 'px';

            document.body.appendChild(c);
            cookies.push(c);

            setTimeout(() => {
                const angle = (Math.random() * Math.PI) + Math.PI;
                const d = 70 + Math.random() * 50;
                c.style.transition = 'all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.2)';
                c.style.transform = `translate(${Math.cos(angle)*d}px, ${Math.sin(angle)*d}px)`;
            }, 10);

            c.onclick = (e) => {
                e.stopPropagation();
                if (!c.dataset.side) moveTo(c, counts.cat <= counts.dog ? 'cat' : 'dog');
            };
        }

        function magnetizeTo(target) {
            const free = cookies.find(c => !c.dataset.side);
            if (free) moveTo(free, target);
        }

        function moveTo(el, target) {
            const zone = document.getElementById(`zone-${target}`);
            const r = zone.getBoundingClientRect();
            const sz = getCookieSize();

            if (!el.dataset.side) {
                counts[target]++;
            } else if (el.dataset.side !== target) {
                counts[el.dataset.side]--;
                counts[target]++;
            }

            el.dataset.side = target;
            document.getElementById('count-cat').innerText = counts.cat;
            document.getElementById('count-dog').innerText = counts.dog;

            // Случайное смещение внутри миски
            const rx = (Math.random() - 0.5) * (r.width * 0.5);
            const ry = (Math.random() - 0.5) * (r.height * 0.3);

            el.style.transition = 'all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
            el.style.left = (r.left + r.width/2 - sz/2 + rx) + 'px';
            el.style.top = (r.top + r.height/2 - sz/2 + ry) + 'px';
            el.style.transform = `scale(0.8) rotate(${Math.random()*40-20}deg)`;

            updateUI();
        }

        function updateUI() {
            const btn = document.getElementById('btn-done');
            if (total === limit) {
                btn.classList.remove('bg-gray-400', 'opacity-40');
                btn.classList.add('bg-blue-600', 'opacity-100');
                btn.style.pointerEvents = 'auto';
            }
        }

        function checkFinal() {
            if (counts.cat === 5 && counts.dog === 5) {
                document.getElementById('win-ui').style.display = 'flex';
            } else {
                const btn = document.getElementById('btn-done');
                btn.innerText = 'НУЖНО ПОРОВНУ!';
                btn.classList.replace('bg-blue-600', 'bg-red-500');
                setTimeout(() => {
                    btn.innerText = 'ГОТОВО!';
                    btn.classList.replace('bg-red-500', 'bg-blue-600');
                }, 1500);
            }
        }

        // КЛЮЧЕВАЯ ЧАСТЬ: Обработка поворота экрана
        window.addEventListener('resize', () => {
            const sz = getCookieSize();
            const box = document.getElementById('cookie-box').getBoundingClientRect();

            cookies.forEach(c => {
                c.style.width = sz + 'px';
                c.style.height = sz + 'px';
                
                if (c.dataset.side) {
                    // Если печенька в миске, пересчитываем координаты миски
                    const zone = document.getElementById(`zone-${c.dataset.side}`);
                    const r = zone.getBoundingClientRect();
                    const rx = (Math.random() - 0.5) * (r.width * 0.5);
                    const ry = (Math.random() - 0.5) * (r.height * 0.3);
                    
                    c.style.transition = 'none'; // Мгновенный перенос при ресайзе
                    c.style.left = (r.left + r.width/2 - sz/2 + rx) + 'px';
                    c.style.top = (r.top + r.height/2 - sz/2 + ry) + 'px';
                } else {
                    // Если печенька просто валяется, возвращаем к коробке
                    c.style.left = (box.left + box.width/2 - sz/2) + 'px';
                    c.style.top = (box.top - 20) + 'px';
                    c.style.transform = 'none';
                }
            });
        });
    </script>
</body>
</html>
